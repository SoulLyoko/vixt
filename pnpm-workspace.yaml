  citty: ^0.2.2
  defu: ^6.1.7
  eslint: ^10.4.0
  eslint-plugin-format: ^2.0.1
  execa: ^9.6.1
  extract-comments: ^1.1.0
  fast-glob: ^3.3.3
  find-up: ^8.0.0
  fs-extra: ^11.3.5
