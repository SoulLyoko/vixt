packages:
  - packages/*
  - playground/*
  - docs

allowBuilds:
  '@parcel/watcher': false
  '@uni-helper/unocss-preset-uni': false
  core-js: false
  core-js-pure: false
  esbuild: false
  simple-git-hooks: false
  vue-demi: false

overrides:
  '@vixt/test-uni>vite': 'catalog:uni'
  '@vue/shared': 'catalog:vue'
  vue: 'catalog:vue'

peerDependencyRules:
  allowAny:
    - '@dcloudio/types'
    - typescript
    - vite

shamefullyHoist: true

